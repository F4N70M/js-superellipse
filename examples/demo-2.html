<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Superellipse | Гибкие формы для UI</title>
    <link rel="stylesheet" href="demo-2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header class="hero">
            <h1>✨ Superellipse <span class="accent">Shape Engine</span></h1>
            <p class="subtitle">Создавайте плавные, органичные границы с математической точностью</p>
        </header>

        <!-- Панель управления -->
        <div class="controls-card">
            <div class="controls-grid">
                <div class="control-group">
                    <label>
                        <span class="label-text">📐 Радиус скругления</span>
                        <div class="slider-wrapper">
                            <input type="range" id="radius" min="0" max="100" value="30" step="1">
                            <span id="radiusVal" class="value-badge">30px</span>
                        </div>
                    </label>
                </div>
                <div class="control-group">
                    <label>
                        <span class="label-text">🌀 Кривизна (n)</span>
                        <div class="slider-wrapper">
                            <input type="range" id="curveFactor" min="-2" max="2" step="0.01" value="1">
                            <span id="curveVal" class="value-badge">1.00</span>
                        </div>
                    </label>
                </div>
                <div class="control-group">
                    <label>
                        <span class="label-text">⚙️ Метод рендеринга</span>
                        <select id="modeSelect">
                            <option value="svg-layer">🎨 SVG-слой (сохраняет контент)</option>
                            <option value="clip-path">✂️ Clip-path (легковесный)</option>
                        </select>
                    </label>
                </div>
                <div class="action-buttons">
                    <button id="resetBtn" class="btn btn-secondary">⟳ Сбросить</button>
                    <button id="destroyBtn" class="btn btn-outline">🗑 Удалить эффект</button>
                </div>
            </div>
        </div>

        <!-- Демонстрационная зона -->
        <div class="demo-area">
            <div class="demo-card">
                <div class="card-header">
                    <span class="chip">Интерактив</span>
                    <span class="chip">Прямая манипуляция</span>
                </div>
                <button id="demoBtn" class="super-button">✨ Суперэллипс ✨</button>
                <div class="mode-buttons">
                    <button data-mode="svg-layer" class="mode-btn active">🎯 SVG-слой</button>
                    <button data-mode="clip-path" class="mode-btn">✂️ Clip-path</button>
                </div>
                <p class="hint">Нажмите на кнопку — форма меняется динамически</p>
            </div>
        </div>

        <!-- Техническая информация -->
        <div class="path-section">
            <div class="section-header">
                <h3>📐 SVG path (d‑атрибут)</h3>
                <button id="copyPathBtn" class="btn-icon" title="Скопировать путь">📋</button>
            </div>
            <div id="pathDisplay" class="path-monospace"></div>
        </div>
    </main>

    <script src="../dist/superellipse.js"></script>
    <script src="demo.js"></script>
    <script>
        // Простой copy to clipboard для красоты (не ломает логику)
        const copyBtn = document.getElementById('copyPathBtn');
        const pathDisplay = document.getElementById('pathDisplay');
        if (copyBtn) {
            copyBtn.addEventListener('click', () => {
                const pathText = pathDisplay.innerText;
                if (pathText && pathText !== '—') {
                    navigator.clipboard.writeText(pathText);
                    copyBtn.textContent = '✅';
                    setTimeout(() => copyBtn.textContent = '📋', 1500);
                }
            });
        }
    </script>
</body>
</html>
